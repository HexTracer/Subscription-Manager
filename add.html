{% extends "layout.html" %}
{% block title %}Add subscription{% endblock %}
{% block main %}
    <div class="card form-card">
        <h1>Add a subscription</h1>
        <form action="/add" method="post">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autofocus required>

            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Choose a category</option>
                {% for category in categories %}
                <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>

            <label for="cost">Cost ($)</label>
            <input id="cost" name="cost" type="number" min="0.01" step="0.01" required>

            <label for="billing_cycle">Billing cycle</label>
            <select id="billing_cycle" name="billing_cycle" required>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>

            <label for="next_renewal">Next renewal date</label>
            <input id="next_renewal" name="next_renewal" type="date" min="{{ today }}" required>

            <label for="notes">Notes (optional)</label>
            <textarea id="notes" name="notes" rows="3"></textarea>

            <button class="button" type="submit">Add subscription</button>
        </form>
    </div>
{% endblock %}
